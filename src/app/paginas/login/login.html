<div class="contenedor-login">
  <div class="fondo-gradiente"></div>

  <mat-card class="tarjeta-login" appearance="outlined">
    <div class="logo-seccion">
      <mat-icon class="logo-icono">rate_review</mat-icon>
      <h1 class="titulo-app">Reviews</h1>
      <p class="subtitulo">Inicia sesión en tu cuenta</p>
    </div>

    <mat-card-content>
      <button mat-stroked-button class="boton-google" (click)="iniciarConGoogle()" [disabled]="cargando()">
        <svg class="icono-google" viewBox="0 0 24 24" width="18" height="18">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar con Google
      </button>

      <mat-divider class="divisor"></mat-divider>
      <span class="texto-divisor">o</span>

      <form [formGroup]="formulario" (ngSubmit)="enviarFormulario()" class="formulario">
        <mat-form-field appearance="outline" class="campo-completo">
          <mat-label>Correo electrónico</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email">
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="campo-completo">
          <mat-label>Contraseña</mat-label>
          <input matInput [type]="ocultarContrasena() ? 'password' : 'text'"
                 formControlName="contrasena" [attr.autocomplete]="ocultarContrasena() ? 'current-password' : 'off'">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button"
                  (click)="ocultarContrasena.set(!ocultarContrasena())">
            <mat-icon>{{ ocultarContrasena() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        @if (error()) {
          <div class="mensaje-error">
            <mat-icon>error_outline</mat-icon>
            <span>{{ error() }}</span>
          </div>
        }

        <button mat-flat-button color="primary" class="boton-principal" type="submit" [disabled]="cargando()">
          @if (cargando()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Iniciar sesión
          }
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
